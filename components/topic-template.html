<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="description" content="Copy this template for new lab topic pages. Replace TITLE, paths, and inner markup.">
  <meta name="author" content="Elucian Moise">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TITLE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="/images/favicon.ico">
  <link rel="stylesheet" href="/prism.css">
  <script src="/prism.js"></script>
  <link rel="stylesheet" href="/sage.css">
  <style>
    .side-bar { order: 1; }
    #main-content { order: 2; }
    @media (max-width: 991px) {
      .side-bar { display: none; }
      .side-bar.active {
        display: block;
        position: absolute;
        top: 100px;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.95);
      }
    }
  </style>
</head>
<body>

<div class="container">

  <header id="dynamic-header" class="container-fluid pb-2"></header>

  <div class="container-fluid px-0">
    <div class="row g-0">
      <aside class="side-bar col-lg-3 col-12">
        <div id="study-sidebar" class="sidebar-content shadow-sm p-3 sticky-top">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0">Learning Path</h5>
            <a id="home-link" href="./index.html#topics" class="btn btn-sm btn-secondary" title="Back to topics">↩</a>
          </div>
          <div class="progress mb-3" style="height: 8px;">
            <div id="main-progress" class="progress-bar bg-success" style="width: 0%;"></div>
          </div>
          <hr>
          <ul id="bookmark-list" class="list-unstyled"></ul>
        </div>
      </aside>

      <main id="main-content" class="col-lg-9 col-12 order-2 order-lg-1 p-3">
        <p class="text-secondary">Article body goes here. Add a matching <code>topic-id.json</code> beside this file for the sidebar.</p>
      </main>
    </div>
  </div>

  <hr>

  <footer class="footer copyright">
    <p class="x-small text-secondary mb-0">&copy; 2026 Sage-Code Laboratory</p>
  </footer>

</div>

<button id="open-sidebar" class="btn btn-primary d-lg-none shadow-lg" type="button">
  <span style="font-size: 24px;">☰</span>
</button>

<script>
  window.TOPIC_CONFIG = {
    labId: 'lab-id',
    topicId: 'topic-id',
    homeLink: './index.html#topics',
    labHomeLink: './index.html',
    inlineContent: true
  };
</script>
<script src="/sage.js" defer></script>
<script src="/common/progress.js" defer></script>
<script src="/common/lab-progress-bridge.js" defer></script>
<script src="/common/topic-loader.js" defer></script>

</body>
</html>
